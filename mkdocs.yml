site_name: 我的知识库
site_description: 基于 Obsidian Vault 构建的个人知识库文档站

# 部署到 GitHub Pages：站点地址（决定资源路径 / canonical / Sitemap）
# 本仓库在 GitHub 设置了独立自定义域名 wiki.hanvon.top（覆盖用户站点 blog2.hanvon.top 的默认继承），
# 因此 site_url 用 wiki.hanvon.top；DNS 需加 CNAME -> wild-civil.github.io，并随站部署 docs/CNAME。
site_url: https://wiki.hanvon.top/

# GitHub 仓库（启用后顶栏出现仓库图标 + 每页「Edit on GitHub」）
repo_url: https://github.com/wild-civil/civil_wiki
edit_uri: edit/main/docs

# 文档源：vault 内的 docs/ 子目录（MkDocs 要求 docs_dir 必须是配置文件的子目录）
docs_dir: docs

# 构建产物输出到 site/（已加入 .gitignore，不要提交）
# 注：Scripts/ 在 docs/ 之外，MkDocs 不会处理它，无需额外排除

# 主题：Material（功能最全、颜值最高，中文界面完善）
# 配色对齐参考项目 Power's Wiki：浅色白底 + 蓝色强调，深色黑底 + 蓝色强调
theme:
  name: material
  language: zh
  custom_dir: overrides        # 自定义主题覆盖（本地字体 preload 等）
  font: false                  # 关闭 Material 默认字体加载，改用 extra.css 的本地字体（国内更稳）
  logo: img/logo.svg           # 左上角站点图标
  favicon: img/logo.svg
  palette:
    # 浅色（默认）：白底 + 蓝色强调
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换深色
    # 深色：黑底 + 蓝色强调
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换浅色
  features:
    - navigation.tabs          # 顶部标签导航（参考项目风格，更简洁）
    - navigation.sections      # 左侧导航按文件夹分区（嵌套分组）
    - navigation.indexes       # 分区标题有专属首页（index.md），点击分区名可进入
    - navigation.footer        # 底部「上一篇 / 下一篇」翻页
    - navigation.top           # 右侧「回到顶部」
    - navigation.tracking      # 滚动时高亮当前章节
    - toc.follow               # 右侧目录跟随滚动
    - content.code.copy        # 代码块一键复制
    - search.suggest           # 搜索联想
    - search.highlight         # 搜索结果高亮

# 插件
plugins:
  - search                                             # 站内搜索（Material 自带）
  - roamlinks                                          # Obsidian [[wikilink]] -> 站点链接（自动转换）
  - git-revision-date-localized:                       # 每页显示「最后更新时间」
      enable_creation_date: true
      enable_git_follow: false                          # 避免新建页面时间戳诡异告警
      locale: zh
  - minify:                                            # 压缩产物，更小更快
      minify_html: true
      minify_css: true
      minify_js: true
      cache_safe: true
  - tags                                               # 标签聚合：每页 tags 自动汇总到 /标签/ 索引页

# 构建后 hook：生成 sitemap.xml（博客改造 item 9），零第三方依赖
hooks:
  - Scripts/sitemap_hook.py

# Markdown 扩展：表格、代码高亮、折叠块、提示框、Mermaid 图、数学公式等
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.betterem
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# 自定义样式与脚本
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/mathjax.js
  - javascripts/mathjax/tex-mml-svg.js   # 本地化 MathJax（SVG 输出，无需外部字体；不再走 cdnjs CDN）

# 导航（手动维护，顺序可控；结构对齐参考项目：一级分类 -> 分区首页/index.md -> 子页面）
