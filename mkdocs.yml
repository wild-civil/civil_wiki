              - 硬件与半导体/硬件设计/基础知识/基本元器件-电阻.md
              - 硬件与半导体/硬件设计/基础知识/基本元器件-电容.md
              - 硬件与半导体/硬件设计/基础知识/基本元器件-电感与磁珠.md
              - 硬件与半导体/硬件设计/基础知识/基本元器件-二极管.md
