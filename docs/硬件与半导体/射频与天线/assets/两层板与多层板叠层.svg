<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320" role="img">
<style>
.th{font-size:13px;font-weight:700;fill:#7A3E00;font-family:'Segoe UI',Arial,'Microsoft YaHei',sans-serif;}
.ts{font-size:11px;fill:#5F5E5A;font-family:'Segoe UI',Arial,'Microsoft YaHei',sans-serif;}
</style>
<title>两层板与多层板射频叠层对比</title>
<desc>左为两层板:顶层信号、底层整块地,介质为整板厚度;右为多层板:信号层下方紧邻专设地平面(L2),介质极薄,并可走内层带状线。过孔把顶层侧地连到参考地。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="th" x="185" y="40" text-anchor="middle">两层板 2-layer</text>
<rect x="90" y="80" width="190" height="170" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<rect x="90" y="250" width="190" height="14" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<rect x="150" y="66" width="70" height="12" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
<line x1="78" y1="72" x2="78" y2="250" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="72" y="162" text-anchor="end">H=1.2mm</text>
<text class="ts" x="185" y="282" text-anchor="middle">参考地=板底(远) → 线宽大</text>
<text class="ts" x="185" y="300" text-anchor="middle">GCPW 过孔需打穿整板</text>

<text class="th" x="495" y="40" text-anchor="middle">多层板 4 / 6+ layer</text>
<rect x="410" y="56" width="170" height="14" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
<rect x="410" y="70" width="170" height="26" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<rect x="410" y="96" width="170" height="12" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<rect x="410" y="108" width="170" height="26" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<rect x="410" y="134" width="170" height="12" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<rect x="410" y="146" width="170" height="26" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<rect x="410" y="172" width="170" height="14" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
<line x1="398" y1="63" x2="398" y2="96" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="392" y="82" text-anchor="end">极近</text>
<line x1="525" y1="63" x2="525" y2="96" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="2 3"/>
<circle cx="525" cy="80" r="2.5" fill="#854F0B"/>
<circle cx="525" cy="96" r="2.5" fill="#854F0B"/>
<text class="ts" x="495" y="200" text-anchor="middle">L2 专设地平面, 线更细、阻抗更稳</text>
<text class="ts" x="495" y="218" text-anchor="middle">可走内层带状线(全屏蔽) · 工厂可控阻抗</text>
</svg>