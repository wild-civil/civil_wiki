<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" role="img" aria-label="hanvon.top 多站点架构图">
  <title>hanvon.top 多站点架构</title>
  <desc>hanvon.top 下挂四个子域名，分别对应 GitHub 仓库与静态生成器</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0C447C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 顶部域名 -->
  <rect x="250" y="20" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="14" font-weight="500" fill="#0C447C">hanvon.top</text>
  <text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#0C447C">DNS 管理</text>

  <!-- 四个子域名 -->
  <g>
    <rect x="70" y="110" width="120" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="130" y="132" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="14" font-weight="500" fill="#0C447C">wiki</text>
    <text x="130" y="150" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#0C447C">MkDocs</text>
    <text x="130" y="164" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#5F5E5A">civil_wiki</text>
  </g>
  <g>
    <rect x="210" y="110" width="120" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="270" y="132" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="14" font-weight="500" fill="#0F6E56">blog2</text>
    <text x="270" y="150" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#0F6E56">Hexo</text>
    <text x="270" y="164" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#5F5E5A">wild-civil.github.io</text>
  </g>
  <g>
    <rect x="350" y="110" width="120" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="410" y="132" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="14" font-weight="500" fill="#854F0B">digest</text>
    <text x="410" y="150" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#854F0B">待建</text>
    <text x="410" y="164" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#5F5E5A">仓库: digest</text>
  </g>
  <g>
    <rect x="490" y="110" width="120" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="550" y="132" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="14" font-weight="500" fill="#993C1D">works</text>
    <text x="550" y="150" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#993C1D">待建</text>
    <text x="550" y="164" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#5F5E5A">仓库: works</text>
  </g>

  <!-- 连接箭头 -->
  <line x1="340" y1="64" x2="130" y2="110" fill="none" stroke="#0C447C" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="64" x2="270" y2="110" fill="none" stroke="#0C447C" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="64" x2="410" y2="110" fill="none" stroke="#0C447C" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="64" x2="550" y2="110" fill="none" stroke="#0C447C" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 底层说明：CNAME 指向 -->
  <rect x="70" y="200" width="540" height="48" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="218" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="13" fill="#444441">所有子域名通过 CNAME 指向</text>
  <text x="340" y="236" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="14" font-weight="500" fill="#185FA5">wild-civil.github.io</text>

  <!-- 底部提示 -->
  <text x="340" y="280" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#5F5E5A">每个仓库在 Settings → Pages → Custom domain 独立绑定自己的子域名</text>
  <text x="340" y="298" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans, system-ui, sans-serif)" font-size="12" fill="#5F5E5A">用户站点 blog2 继承后，其余项目仓库可单独覆盖</text>
</svg>