<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" width="780" height="380" font-family="'Segoe UI','Helvetica Neue',Arial,'Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="780" height="380" fill="#ffffff"/>

  <!-- title -->
  <text x="390" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#202124">2.4G 关键尺寸 与 50Ω 阻抗匹配</text>

  <!-- ===== Left: dimensions ===== -->
  <rect x="30" y="50" width="320" height="300" rx="10" fill="#f8f9fa" stroke="#dadce0" stroke-width="1"/>
  <text x="190" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#174ea6">关键尺寸 @ 2.45 GHz</text>

  <!-- wavelength bar -->
  <rect x="55" y="98" width="270" height="10" rx="5" fill="#1a73e8"/>
  <text x="190" y="128" text-anchor="middle" font-size="14" fill="#202124">自由空间波长 λ ≈ 12.2 cm</text>

  <rect x="70" y="150" width="250" height="46" rx="8" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
  <text x="195" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#202124">¼λ 单极子 ≈ 3.1 cm</text>
  <text x="195" y="189" text-anchor="middle" font-size="11" fill="#5f6368">橡胶鸭 / IFA 的基准长度</text>

  <rect x="70" y="210" width="250" height="46" rx="8" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
  <text x="195" y="232" text-anchor="middle" font-size="14" font-weight="600" fill="#202124">½λ 偶极子 ≈ 6.1 cm</text>
  <text x="195" y="249" text-anchor="middle" font-size="11" fill="#5f6368">PCB 偶极子 / 对称振子</text>

  <text x="190" y="288" text-anchor="middle" font-size="11.5" fill="#b06000">注意：PCB 走线因 FR-4 介质</text>
  <text x="190" y="306" text-anchor="middle" font-size="11.5" fill="#b06000">(εr≈4.4) 比空气更短，</text>
  <text x="190" y="324" text-anchor="middle" font-size="11.5" fill="#b06000">不能直接照空气尺寸画！</text>

  <!-- ===== Right: matching chain ===== -->
  <rect x="400" y="50" width="350" height="300" rx="10" fill="#f8f9fa" stroke="#dadce0" stroke-width="1"/>
  <text x="575" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#137333">50Ω 阻抗匹配链路</text>

  <!-- RF chip -->
  <rect x="495" y="98" width="160" height="46" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.4"/>
  <text x="575" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="#174ea6">RF 芯片 (50Ω)</text>
  <text x="575" y="137" text-anchor="middle" font-size="11" fill="#5f6368">单端 or 差分输出</text>

  <!-- arrow -->
  <path d="M575 144 L575 162" fill="none" stroke="#5f6368" stroke-width="1.6"/>
  <path d="M569 156 L575 164 L581 156" fill="none" stroke="#5f6368" stroke-width="1.6"/>

  <!-- pi network -->
  <rect x="470" y="166" width="210" height="60" rx="8" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.4"/>
  <text x="575" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#b06000">π 型匹配网络</text>
  <text x="575" y="210" text-anchor="middle" font-size="12" fill="#202124">C1 — L1 — C2</text>

  <!-- arrow -->
  <path d="M575 226 L575 244" fill="none" stroke="#5f6368" stroke-width="1.6"/>
  <path d="M569 238 L575 246 L581 238" fill="none" stroke="#5f6368" stroke-width="1.6"/>

  <!-- antenna -->
  <rect x="495" y="248" width="160" height="46" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.4"/>
  <text x="575" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#137333">天线 (50Ω)</text>
  <text x="575" y="287" text-anchor="middle" font-size="11" fill="#5f6368">IFA / 单极子 / 陶瓷</text>

  <!-- target -->
  <rect x="455" y="306" width="240" height="30" rx="8" fill="#ffffff" stroke="#34a853" stroke-width="1.4"/>
  <text x="575" y="326" text-anchor="middle" font-size="12.5" font-weight="600" fill="#137333">目标：S11 &lt; −10 dB (VSWR &lt; 2:1)</text>

  <!-- balun note -->
  <text x="575" y="356" text-anchor="middle" font-size="11" fill="#80868b">差分输出(如 nRF52) 需先过 balun 转单端</text>
</svg>
